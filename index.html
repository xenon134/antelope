<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5/css/xterm.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-width: 727px;
    }

    #terminal-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #333;
      min-height: 0;
      gap: 8px;
    }

    #pagination {
      height: 40px;
      background: #222;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: monospace;
      font-size: 14px;
      border-top: 2px solid #444;
    }

    #pagination button {
      padding: 4px 12px;
      cursor: pointer;
      background: #444;
      color: white;
      border: 1px solid #666;
      border-radius: 3px;
    }

    #pagination button:disabled {
      background: #222;
      color: #666;
      cursor: not-allowed;
    }

    .terminal-wrapper {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="app-container">
    <div id="terminal-container"></div>
    <div id="pagination" style="display: none;">
      <button id="btn-prev">&lt; Prev</button>
      <span id="page-info">Page 1 / 1</span>
      <button id="btn-next">Next &gt;</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>

  <script>
    const terminals = {};
    const fitAddons = {};
    const wrappers = {};
    const rows = {};
    const container = document.getElementById('terminal-container');
    
    let maxParallel = 4;
    let currentPage = 1;
    const itemsPerPage = 12;

    function updatePagination() {
      const totalPages = Math.ceil(maxParallel / itemsPerPage);
      document.getElementById('page-info').innerText = `Page ${currentPage} / ${totalPages}`;
      document.getElementById('pagination').style.display = totalPages > 1 ? 'flex' : 'none';
      
      document.getElementById('btn-prev').disabled = currentPage === 1;
      document.getElementById('btn-next').disabled = currentPage === totalPages;

      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;

      for (const [id, row] of Object.entries(rows)) {
        const numId = parseInt(id);
        if (numId >= startIndex && numId < endIndex) {
          row.style.display = 'flex';
        } else {
          row.style.display = 'none';
        }
      }

      // Need to refit visible terminals
      setTimeout(() => {
        Object.entries(fitAddons).forEach(([id, addon]) => {
          const numId = parseInt(id);
          if (numId >= startIndex && numId < endIndex) {
            try { addon.fit(); } catch (e) {}
          }
        });
      }, 50);
    }

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        updatePagination();
      }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      const totalPages = Math.ceil(maxParallel / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        updatePagination();
      }
    });

    window.addEventListener('resize', () => {
      Object.values(fitAddons).forEach(addon => {
          try { addon.fit(); } catch(e) {}
      });
    });

    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.binaryType = 'arraybuffer';

    function send(data, metadata = {}) {
      metadata.Time = new Date().toISOString();
      let header = "";
      for (const [k, v] of Object.entries(metadata)) {
        header += `${k}: ${v}\n`;
      }
      header += "\n";
      const headerBytes = new TextEncoder().encode(header);
      
      const payload = new Uint8Array(headerBytes.length + data.length);
      payload.set(headerBytes, 0);
      payload.set(data, headerBytes.length);
      
      ws.send(payload);
    }

    function decodeMessage(payload) {
      const ui8 = payload instanceof Uint8Array ? payload : new Uint8Array(payload);
      
      let headerEnd = -1;
      for (let i = 0; i < ui8.length - 1; i++) {
        if (ui8[i] === 10 && ui8[i+1] === 10) {
          headerEnd = i;
          break;
        }
      }
      
      if (headerEnd === -1) {
        return { data: ui8, metadata: {} };
      }
      
      const headerBytes = ui8.slice(0, headerEnd);
      const data = ui8.slice(headerEnd + 2);
      const headerStr = new TextDecoder().decode(headerBytes);
      
      const metadata = {};
      for (const line of headerStr.split('\n')) {
        if (line) {
          const idx = line.indexOf(': ');
          if (idx !== -1) {
            const key = line.slice(0, idx);
            const value = line.slice(idx + 2);
            metadata[key] = value;
          }
        }
      }
      
      return { data, metadata };
    }

    function createTerminal(terminalID) {
        if (terminals[terminalID]) return;

        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.width = '100%';
        row.style.flex = '1';
        row.style.minHeight = '0';

        const titleDiv = document.createElement('div');
        titleDiv.textContent = `Terminal ${terminalID + 1}`;
        titleDiv.style.flex = '1';
        titleDiv.style.padding = '5px';
        titleDiv.style.background = '#222';
        titleDiv.style.color = '#ccc';
        titleDiv.style.display = 'flex';
        titleDiv.style.alignItems = 'center';
        titleDiv.style.justifyContent = 'center';
        // titleDiv.style.fontFamily = 'monospace';
        titleDiv.style.fontSize = '14px';

        const wrapper = document.createElement('div');
        wrapper.className = 'terminal-wrapper';
        wrapper.style.flex = '1';
        wrapper.style.height = '100%';
        wrapper.style.minHeight = '0';

        row.appendChild(titleDiv);
        row.appendChild(wrapper);
        container.appendChild(row);

        rows[terminalID] = row;
        wrappers[terminalID] = wrapper;

        const term = new Terminal({
            convertEol: true,
            theme: { background: '#000000' },
            scrollback: 5000,
        });

        const fitAddon = new window.FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(wrapper);
        
        term.onData((data) => {
            // Send raw keystrokes/sequences to the server as bytes
            send(new TextEncoder().encode(data), { Type: "Input", TerminalID: terminalID.toString() });
        });

        terminals[terminalID] = term;
        fitAddons[terminalID] = fitAddon;
        
        updatePagination();
    }

    function closeTerminal(terminalID) {
        if (terminals[terminalID]) {
            terminals[terminalID].dispose();
            delete terminals[terminalID];
            delete fitAddons[terminalID];
            delete wrappers[terminalID];
            delete rows[terminalID];
        }
        const row = rows[terminalID];
        if (row) {
            row.remove();
        }
    }

    ws.onmessage = (event) => {
      const { data, metadata } = decodeMessage(event.data);
      // console.log("Received metadata:", metadata);
      
      if (metadata.Type === "Control") {
          const controlDataStr = new TextDecoder().decode(data);
          const controlData = JSON.parse(controlDataStr);
          console.log("Received control message:", metadata, controlData.action);
          if (controlData.action === "init") {
              maxParallel = controlData.maxParallel;
              updatePagination();
          } else if (controlData.action === "openTerminal") {
              createTerminal(controlData.terminalID);
          } else if (controlData.action === "closeTerminal") {
              closeTerminal(controlData.terminalID);
          } else if (controlData.action === "setTermTitle") {
            const row = rows[controlData.terminalID];
            console.log(row);
            if (row) {
              const titleDiv = row.querySelector('div');
              titleDiv.textContent = controlData.title;
            }
          } else console.log("Unknown control action:", controlData.action);
      } else if (metadata.Type === "Output") {
          const tId = metadata.TerminalID;
          if (tId !== undefined && terminals[tId]) {
              terminals[tId].write(data);
          }
      } else console.log("Unknown message type:", metadata.Type);
    };

    ws.onclose = () => {
        Object.values(terminals).forEach(term => term.write('\r\n\r\n[Connection closed]'));
    };
    ws.onerror = () => {
        Object.values(terminals).forEach(term => term.write('\r\n[WebSocket error]'));
    };
  </script>
</body>

</html>
